<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed · Ardena</title>
    <link rel="icon" type="image/png" href="js/assets/logo.png">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f4f6fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #1f2937;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border: 1px solid #e7ebf2;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }
        .card-header {
            background: #0066cc;
            text-align: center;
            padding: 24px 28px;
        }
        .card-header img {
            height: 46px;
            filter: brightness(0) invert(1); /* render the colored logo white */
        }
        .card-body {
            padding: 36px 32px 40px;
            text-align: center;
        }
        .check {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #e6f6ea;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .check svg { width: 32px; height: 32px; color: #1d7a36; }
        h1 { margin: 0 0 10px; font-size: 22px; font-weight: 600; }
        p { margin: 0 0 6px; font-size: 15px; line-height: 1.6; color: #5b6573; }
        .foot { margin-top: 28px; font-size: 12px; color: #9aa4b2; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <img src="js/assets/logo.png" alt="Ardena">
        </div>
        <div class="card-body">
            <div class="check" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h1>You've been unsubscribed</h1>
            <p>You won't receive further marketing emails from Ardena.</p>
            <p>Changed your mind? You can re-enable emails anytime from your account.</p>
            <p class="foot">&copy; Ardena · Nairobi, Kenya</p>
        </div>
    </div>
</body>
</html>
